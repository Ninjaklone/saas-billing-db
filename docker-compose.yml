name: saas-billing-dataeng

x-airflow-common: &airflow-common
  image: apache/airflow:2.10.4-python3.11
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-metadata-db/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
    # Packages installed into the Airflow containers at startup.
    # confluent-kafka: producer/consumer client
    # psycopg2-binary: Postgres driver for billing_audit_log reads
    # boto3: AWS S3 client for raw landing zone writes
    _PIP_ADDITIONAL_REQUIREMENTS: "confluent-kafka psycopg2-binary boto3"
    # Billing source DB — set real values in .env (gitignored).
    BILLING_DB_HOST: ${BILLING_DB_HOST}
    BILLING_DB_PORT: ${BILLING_DB_PORT}
    BILLING_DB_NAME: ${BILLING_DB_NAME}
    BILLING_DB_USER: ${BILLING_DB_USER}
    BILLING_DB_PASSWORD: ${BILLING_DB_PASSWORD}
    KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
    # AWS credentials for S3 raw landing zone — set real values in .env (gitignored).
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
    S3_RAW_LANDING_BUCKET: ${S3_RAW_LANDING_BUCKET}
  volumes:
    - ./pipeline/airflow/dags:/opt/airflow/dags
    - ./pipeline/airflow/logs:/opt/airflow/logs
    - ./pipeline/kafka:/opt/airflow/kafka_scripts
  depends_on:
    airflow-metadata-db:
      condition: service_healthy

services:
  # Airflow's OWN metadata store (DAG runs, task state). This is NOT the billing database —
  # the billing Postgres (tenants/invoices/etc.) stays wherever it already lives (local install,
  # RDS, or CloudSQL) and is reached over the network using the BILLING_DB_* vars above.
  airflow-metadata-db:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-metadata-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    user: "0"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs/scheduler
        chown -R 50000:0 /opt/airflow/logs
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname Gara --lastname Joshua \
          --role Admin --email admin@example.com || true

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      - airflow-init

  # Kafka in KRaft mode — no Zookeeper container needed (deprecated path anyway as of
  # Kafka 3.x/4.x). Single broker is enough for portfolio-scale event volume.
  kafka:
    image: apache/kafka:3.8.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "saas-billing-dataeng-1"
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "9092:9092"

  # Visual topic browser — makes it much easier to verify Phase 11 producer/consumer
  # behavior than reading raw Airflow task logs.
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8081:8080"
    depends_on:
      - kafka

volumes:
  airflow-metadata-data:
  kafka-data:
